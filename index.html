<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>KanbanBoard — Real-time collaborative task management</title>
  <meta name="description"
    content="KanbanBoard is a real-time collaborative Kanban board. Drag and drop tasks, invite your team, and watch changes sync instantly — no refresh required." />
  <meta name="theme-color" content="#171717" />
  <meta name="author" content="KanbanBoard" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="KanbanBoard — Real-time collaborative task management" />
  <meta property="og:description"
    content="Drag and drop tasks, invite your team, and watch changes sync instantly — no refresh required." />
  <meta property="og:image" content="/favicon.svg" />
  <meta property="og:site_name" content="KanbanBoard" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="KanbanBoard — Real-time collaborative task management" />
  <meta name="twitter:description" content="Drag and drop tasks, invite your team, and watch changes sync instantly." />
  <!-- Prevent theme flashing (FOUC) -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem('kanban-theme');
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
